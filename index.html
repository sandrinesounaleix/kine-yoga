<style>
  :root {

    grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 6px;
    margin-bottom: 16px;
  }
  .weekpill {
    border: none;
    cursor: pointer;
    padding: 10px 4px;
    border-radius: 10px;
    background: var(--bg-soft);
    color: var(--text-secondary);
    text-align: center;

  .weekpill .pct { font-size: 11px; opacity: 0.85; margin-top: 2px; }

    margin-top: 10px;

  }
  .progressbar-fill {

    background: var(--accent);

  }

    display: flex;
    gap: 8px;
    padding: 10px 12px;
    background: var(--warn-bg);
    border-radius: 10px;
    margin-bottom: 14px;
    border: 0.5px solid var(--border);
  }
  .watchbox-icon { flex-shrink: 0; margin-top: 1px; color: var(--warn-text); font-size: 15px; }

    color: var(--text-tertiary);
    margin: 0 0 10px;
    text-align: center;
  }

    text-transform: uppercase;

    height: 21px;

  glidingTibialPost: { label: "Gliding — tibial postérieur (intérieur du tibia)", how: "C'est ta zone fibrosée. Assise, pose les pouces le long du bord interne du tibia (l'os de la jambe), juste derrière. Pression douce, et bouge le pied (intérieur ↔ extérieur) sous ta main. Remonte doucement de la cheville vers le genou. Vas-y progressivement, c'est sensible." },

const DAYS = ["lun", "mar", "mer", "jeu", "ven", "sam", "dim"];
const STORAGE_KEY = "programme-kine-sandrine-v1";
let state = { checks: {}, currentWeek: 1, openDetails: {} };

function allItemsForWeek(week) {
  return [...week.morning, ...week.extra, ...week.evening];
}

function dayKey(weekNum, dayIdx, itemId) {
  return `w${weekNum}-d${dayIdx}-${itemId}`;
}

function computeWeekStats(weekNum) {
  const week = PROGRAM[weekNum - 1];
  const items = allItemsForWeek(week);
  const totalPossible = items.length * 7;
  let done = 0;
  for (let d = 0; d < 7; d++) {
    for (const item of items) {
      if (state.checks[dayKey(weekNum, d, item.id)]) done++;
    }
  }
  return { done, totalPossible, pct: totalPossible ? Math.round((done / totalPossible) * 100) : 0 };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state.checks = parsed.checks || {};
      state.currentWeek = parsed.currentWeek || 1;
    }
  } catch (e) {
    console.error("Lecture impossible", e);
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ checks: state.checks, currentWeek: state.currentWeek }));
  } catch (e) {
    console.error("Sauvegarde impossible", e);
  }
}

function playIcon() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>';
}
function chevronIcon() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>';
}
function warnIcon() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M12 9v4"></path><path d="M10.3 3.9 2.5 17a2 2 0 0 0 1.7 3h15.6a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"></path><path d="M12 17h.01"></path></svg>';
}

function renderWeekPills() {
  let html = '<div class="weekgrid">';
  for (const w of PROGRAM) {
    const stats = computeWeekStats(w.week);
    const active = w.week === state.currentWeek ? " active" : "";
    html += `<button class="weekpill${active}" data-week="${w.week}"><div class="wk">S${w.week}</div><div class="pct">${stats.pct}%</div></button>`;
  }
  html += "</div>";
  return html;
}

function renderVidLinks(vids) {
  if (!vids || !vids.length) return "";
  let html = '<div class="vidlinks">';
  for (const [label, url] of vids) {
    html += `<a class="vidlink" href="${url}" target="_blank" rel="noopener">${playIcon()}<span>${label}</span></a>`;
  }
  html += "</div>";
  return html;
}

function renderItem(weekNum, dayIdx, item) {
  const key = dayKey(weekNum, dayIdx, item.id);
  const checked = !!state.checks[key];
  const detailKey = `${weekNum}-${item.id}`;
  const isOpen = !!state.openDetails[detailKey];
  return `
    <div class="item">
      <div class="item-row">
        <input type="checkbox" data-key="${key}" ${checked ? "checked" : ""}>
        <div class="item-body">
          <button class="item-toggle" data-detail="${detailKey}">
            <span class="item-label${checked ? " done" : ""}">${item.ex.label}</span>
            <span class="item-chevron${isOpen ? " open" : ""}">${chevronIcon()}</span>
          </button>
          <div class="item-freq">${item.freq}</div>
          ${isOpen ? `<div class="item-detail">${item.ex.how}${renderVidLinks(item.ex.vids)}</div>` : ""}
        </div>
      </div>
    </div>`;
}

function renderDayCard(weekNum, dayIdx, week) {
  let rows = '<div class="sectionlabel">matin</div>';
  for (const item of week.morning) rows += renderItem(weekNum, dayIdx, item);
  if (week.extra.length) {
    rows += '<div class="sectionlabel">renfo / mobilité</div>';
    for (const item of week.extra) rows += renderItem(weekNum, dayIdx, item);
  }
  rows += '<div class="sectionlabel">soir</div>';
  for (const item of week.evening) rows += renderItem(weekNum, dayIdx, item);

  return `<div class="daycard"><div class="daylabel">${DAYS[dayIdx]}</div>${rows}</div>`;
}

function render() {
  const week = PROGRAM[state.currentWeek - 1];
  const stats = computeWeekStats(state.currentWeek);

  let daysHtml = "";
  for (let d = 0; d < 7; d++) {
    daysHtml += renderDayCard(state.currentWeek, d, week);
  }

  const app = document.getElementById("app");
  app.innerHTML = `
    ${renderWeekPills()}
    <div class="weekhead">
      <div class="weekhead-row">
        <div>
          <p class="weekhead-title">Semaine ${week.week} — ${week.theme}</p>
          <p class="weekhead-focus">${week.focus}</p>
        </div>
        <p class="weekhead-pct">${stats.pct}%</p>
      </div>
      <div class="progressbar"><div class="progressbar-fill" style="width:${stats.pct}%"></div></div>
    </div>
    <div class="watchbox">
      <span class="watchbox-icon">${warnIcon()}</span>
      <p>${week.watch}</p>
    </div>
    <p class="hint">Touche le nom d'un exercice pour voir le détail</p>
    <div>${daysHtml}</div>
  `;

  app.querySelectorAll(".weekpill").forEach(btn => {
    btn.addEventListener("click", () => {
      state.currentWeek = parseInt(btn.dataset.week, 10);
      saveState();
      render();
    });
  });

  app.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener("change", () => {
      state.checks[cb.dataset.key] = cb.checked;
      saveState();
      render();
    });
  });

  app.querySelectorAll('button[data-detail]').forEach(btn => {
    btn.addEventListener("click", () => {
      const key = btn.dataset.detail;
      state.openDetails[key] = !state.openDetails[key];
      render();
    });
  });
}

loadState();
render();
</script>
</body>
</html>
